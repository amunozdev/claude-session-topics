name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Shell Tests
  test-shell:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Bats
      run: |
        sudo apt-get update
        sudo apt-get install -y bats
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq bats

    - name: Run shell tests
      run: |
        ./test.sh
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: shell-test-results
        path: test-reports/

  # Job 3: Node.js Tests
  test-node:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Node.js tests
      run: pnpm test
    
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/

  # Job 4: Static Analysis
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
    
    - name: Run ShellCheck
      run: |
        shellcheck scripts/*.sh --severity=warning
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run ESLint
      run: |
        pnpm exec eslint bin/install.js || true

  # Job 5: Validation
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate package.json
      run: |
        node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json is valid');"
    
    - name: Check version consistency
      run: |
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        echo "Package version: $PACKAGE_VERSION"
        # Add additional version checks here if needed
    
    - name: Check file structure
      run: |
        test -f bin/install.js || (echo "Missing bin/install.js" && exit 1)
        test -f scripts/statusline.sh || (echo "Missing scripts/statusline.sh" && exit 1)
        echo "All required files present"

  # Job 6: Integration (macOS)
  test-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew install jq bats-core

    - name: Run tests
      run: |
        ./test.sh
      continue-on-error: true  # macOS tests are informational
